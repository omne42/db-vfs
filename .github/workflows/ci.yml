name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # stable
        with:
          toolchain: 1.91.1
          components: rustfmt,clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Gates (linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: ./scripts/gate.sh

      - name: Gates (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets --locked
          cargo check --workspace --all-targets --no-default-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --locked
          cargo test --workspace --no-default-features --locked
          cargo test --workspace --all-features --locked
          cargo tree -d --workspace --locked

  postgres-integration:
    name: Postgres Integration (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: db_vfs_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d db_vfs_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # stable
        with:
          toolchain: 1.91.1

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run Postgres-backed all-features test suite
        env:
          DB_VFS_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/db_vfs_ci
        run: cargo test --workspace --all-features --locked
